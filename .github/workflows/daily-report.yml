name: Trigger Daily Report

on:
  schedule:
    - cron: '30 20 * * *'  # 20:30 UTC = 02:00 IST (captures full previous day)
  workflow_dispatch:        # manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Wake + generate report
        run: |
          curl -s -X POST https://dhaba-ai.onrender.com/admin/report/generate \
            -H "X-API-Key: ${{ secrets.DHABA_API_KEY }}" \
            --max-time 120 --retry 2

      - name: Embed today's summary
        run: |
          curl -s -X POST https://dhaba-ai.onrender.com/admin/embed-day \
            -H "X-API-Key: ${{ secrets.DHABA_API_KEY }}" \
            --max-time 120 --retry 2
